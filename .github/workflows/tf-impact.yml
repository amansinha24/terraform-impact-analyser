name: TF Impact Analysis

on:
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  tf-impact:
    name: Terraform Impact Analysis
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-south-1
      TF_VERSION: 1.9.0

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r analyser/requirements.txt

      # This single step gives access to BOTH:
      # 1. Terraform state in S3
      # 2. Amazon Bedrock for AI analysis
      # One role, two purposes. Clean architecture.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -input=false -out=tfplan

      - name: Convert plan to JSON
        working-directory: terraform
        run: terraform show -json tfplan > ../analyser/plan.json

      # No ANTHROPIC_API_KEY needed anymore.
      # Bedrock access comes from the AWS OIDC role above.
      - name: Run TF Impact Analysis
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python analyser/main.py
